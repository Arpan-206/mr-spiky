name: Mr. Spiky code review

# Reusable workflow. Callers reference it like:
#
#   jobs:
#     review:
#       uses: Arpan-206/mr-spiky/.github/workflows/mr-spiky-review.yml@main
#       with:
#         min_score: 0.95
#         max_comments: 5
#       permissions:
#         contents: read
#         pull-requests: write
#
# The caller must trigger on `pull_request_target` (or `pull_request` for
# same-repo-only PRs). The event context propagates through — this workflow
# reads `github.event.pull_request.*` from whatever the caller's trigger was.
#
# `pull_request_target` in the caller gives us a token with write access to
# post review comments on PRs from forks. That token cannot see repository
# *secrets* (safe by design), so we only use it for GitHub API calls.

on:
  workflow_call:
    inputs:
      min_score:
        description: "Score threshold for a line to get an inline comment (0.0–1.0). Higher = fewer comments."
        required: false
        type: number
        default: 0.95
      max_comments:
        description: "Hard cap on inline comments per PR. Prevents large refactors from spamming the diff."
        required: false
        type: number
        default: 5
      mr_spiky_ref:
        description: "Branch/tag/SHA of Arpan-206/mr-spiky to run. Pin this in prod."
        required: false
        type: string
        default: main

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Mr. Spiky
        uses: actions/checkout@v5
        with:
          repository: Arpan-206/mr-spiky
          ref: ${{ inputs.mr_spiky_ref }}
          path: mr-spiky

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv==0.11.15

      - name: Install Mr. Spiky deps
        working-directory: mr-spiky
        run: uv sync --no-dev

      - name: Download trained model artifacts
        working-directory: mr-spiky
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Latest release with a models.tar.gz asset. If not available yet,
          # the review runs in mock mode (still functional, just uses the
          # linear-scoring fallback).
          if gh release download --repo Arpan-206/mr-spiky --pattern "models.tar.gz" --dir . 2>/dev/null; then
            tar -xzvf models.tar.gz
            echo "loaded trained SNN artifacts"
          else
            echo "no release asset found — running in mock mode"
          fi

      - name: Fetch PR diff + head/base checkouts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            > pr.patch
          # Head checkout — post-change state, used for per-line scoring.
          gh repo clone ${{ github.event.pull_request.head.repo.full_name }} pr-checkout -- \
            --branch ${{ github.event.pull_request.head.ref }} \
            --depth 1
          # Base checkout — pre-change state, used to compute
          # `function_score_delta` (the "your changes made this function
          # 20% gnarlier" signal). If cloning the base fails we still run;
          # deltas are just not shown.
          gh repo clone ${{ github.repository }} pr-base-checkout -- \
            --branch ${{ github.event.pull_request.base.ref }} \
            --depth 1 || echo "base checkout failed; deltas will be omitted"

      - name: Run Mr. Spiky review
        working-directory: mr-spiky
        run: |
          uv run python -m src.review \
            --diff ../pr.patch \
            --root ../pr-checkout \
            $( [ -d ../pr-base-checkout ] && echo "--base-root ../pr-base-checkout" ) \
            --min-score ${{ inputs.min_score }} \
            --max-comments ${{ inputs.max_comments }} \
            --format json > ../review.json
          cat ../review.json

      - name: Post review comments
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess

          data = json.load(open("review.json"))
          repo = os.environ["REPO"]
          pr = os.environ["PR"]
          sha = os.environ["HEAD_SHA"]

          payload = {
              "commit_id": sha,
              "event": "COMMENT",
              "body": data.get("summary_comment", ""),
              "comments": [
                  {"path": c["path"], "line": c["line"], "side": c["side"], "body": c["body"]}
                  for c in data.get("inline_comments", [])
              ],
          }

          subprocess.run(
              [
                  "gh", "api",
                  "--method", "POST",
                  f"repos/{repo}/pulls/{pr}/reviews",
                  "--input", "-",
              ],
              input=json.dumps(payload).encode(),
              check=True,
          )
          PY
