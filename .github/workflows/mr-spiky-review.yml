name: Mr. Spiky code review

# Trigger on any PR against the default branch. `pull_request_target` is
# intentional — it gives us a GITHUB_TOKEN with write access to post review
# comments back to the PR. That token cannot see repository *secrets* (safe
# for forks), so we're only using it to authenticate the review-posting API
# calls.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mr. Spiky
        uses: actions/checkout@v5
        with:
          repository: Arpan-206/mr-spiky
          # Pin a version once we publish releases; main is fine while
          # we're iterating.
          ref: main
          path: mr-spiky

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv==0.11.15

      - name: Install Mr. Spiky deps
        working-directory: mr-spiky
        run: uv sync --no-dev

      - name: Download trained model artifacts
        working-directory: mr-spiky
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p models
          # Latest release with a models.tar.gz asset. If not available yet,
          # the review runs in mock mode (still functional, just uses the
          # linear-scoring fallback).
          if gh release download --repo Arpan-206/mr-spiky --pattern "models.tar.gz" --dir models/ 2>/dev/null; then
            tar -xzf models/models.tar.gz -C models/
            echo "loaded trained SNN artifacts"
          else
            echo "no release asset found — running in mock mode"
          fi

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            > pr.patch
          # Also mirror the PR checkout (post-merge state) so review.py can
          # read the full file contents locally.
          gh repo clone ${{ github.event.pull_request.head.repo.full_name }} pr-checkout -- \
            --branch ${{ github.event.pull_request.head.ref }} \
            --depth 1

      - name: Run Mr. Spiky review
        working-directory: mr-spiky
        run: |
          uv run python -m src.review \
            --diff ../pr.patch \
            --root ../pr-checkout \
            --min-score 0.95 \
            --max-comments 5 \
            --format json > ../review.json
          cat ../review.json

      - name: Post review comments
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess

          data = json.load(open("review.json"))
          repo = os.environ["REPO"]
          pr = os.environ["PR"]
          sha = os.environ["HEAD_SHA"]

          # Build a review payload: inline comments + top-level body.
          payload = {
              "commit_id": sha,
              "event": "COMMENT",
              "body": data.get("summary_comment", ""),
              "comments": [
                  {"path": c["path"], "line": c["line"], "side": c["side"], "body": c["body"]}
                  for c in data.get("inline_comments", [])
              ],
          }

          subprocess.run(
              [
                  "gh", "api",
                  "--method", "POST",
                  f"repos/{repo}/pulls/{pr}/reviews",
                  "--input", "-",
              ],
              input=json.dumps(payload).encode(),
              check=True,
          )
          PY
